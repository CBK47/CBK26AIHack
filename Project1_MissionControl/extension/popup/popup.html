<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Mission Control</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header class="ticker-header card">
      <div class="live-dot"></div>
      <div class="ticker-content" id="ticker-text">MONITORING AI PLATFORMS • ONLINE</div>
    </header>

    <main class="center-stage">
      <!-- ChatGPT Gauge -->
      <div class="gauge-card card">
        <div class="gauge-branding">
          <img src="../assets/chatgpt.png" class="brand-logo" alt="ChatGPT">
          <div class="gauge-title">GPT</div>
        </div>
        <div class="liquid-gauge">
          <div class="liquid-fill" id="fill-chatgpt" style="--fill-level: 5%;">
            <div class="wave"></div>
            <div class="wave wave2"></div>
          </div>
          <div class="gauge-overlay">
            <span class="tokens-value" id="val-chatgpt">0</span>
            <span class="tokens-label">tokens</span>
          </div>
        </div>
        <div class="stats-row">
          <span>Limit</span>
          <span id="limit-chatgpt">100,000</span>
        </div>
      </div>

      <!-- Claude Gauge -->
      <div class="gauge-card card">
        <div class="gauge-branding">
          <img src="../assets/claude.png" class="brand-logo" alt="Claude">
          <div class="gauge-title">Claude</div>
        </div>
        <div class="liquid-gauge claude-theme">
          <div class="liquid-fill" id="fill-claude" style="--fill-level: 5%;">
            <div class="wave"></div>
            <div class="wave wave2"></div>
          </div>
          <div class="gauge-overlay">
            <span class="tokens-value" id="val-claude">0</span>
            <span class="tokens-label">tokens</span>
          </div>
        </div>
        <div class="stats-row">
          <span>Limit</span>
          <span id="limit-claude">100,000</span>
        </div>
      </div>

      <!-- Kimi Gauge -->
      <div class="gauge-card card">
        <div class="gauge-branding">
          <img src="../assets/kimi.png" class="brand-logo" alt="Kimi">
          <div class="gauge-title">Kimi</div>
        </div>
        <div class="liquid-gauge kimi-theme">
          <div class="liquid-fill" id="fill-kimi" style="--fill-level: 5%;">
            <div class="wave"></div>
            <div class="wave wave2"></div>
          </div>
          <div class="gauge-overlay">
            <span class="tokens-value" id="val-kimi">0</span>
            <span class="tokens-label">tokens</span>
          </div>
        </div>
        <div class="stats-row">
          <span>Limit</span>
          <span id="limit-kimi">100,000</span>
        </div>
      </div>
    </main>

    <!-- Theme Controls -->
    <div class="theme-controls">
      <div class="theme-toggle" id="theme-toggle" role="button" tabindex="0" title="Toggle light/dark mode">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
      <select id="color-selector" class="select-input">
        <option value="blue">Blue</option>
        <option value="peak">Peak</option>
        <option value="red">Red Light</option>
      </select>
    </div>

    <button class="dashboard-btn" id="open-dashboard">
      ⬡ OPEN OBSERVATORY
    </button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
